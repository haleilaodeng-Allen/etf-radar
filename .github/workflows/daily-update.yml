name: Update ETF Radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update market signals
        run: python scripts/update_market.py
      - name: Commit updated status when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/etf_status.json
          git diff --cached --quiet || git commit -m "Update ETF Radar market status"
          git push

# 定时更新会在手动验证获得连续有效数据后再开启。